<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premkumar Pawar - Contact</title>
    <meta name="description" content="Get in touch with Premkumar Pawar, a frontend developer, and discuss your project or collaboration ideas." />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Premkumar Pawar - Contact">
    <meta property="og:description" content="Get in touch with Premkumar Pawar, a frontend developer, and discuss your project or collaboration ideas.">
    <meta property="og:image" content="path/to/your/image.jpg">
    <meta property="og:url" content="https://yourwebsite.com/contact">

    <!-- Favicon -->
    <link rel="icon" href="path/to/favicon.ico" type="image/x-icon" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        /* Global styles */
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            text-decoration: none;
        }

        :root {
            --width: 90%;
            --bg: #0f051e;
            --primary-color: #4200fc;
            --secondary-color: #f901fc;
            --text-color: #fff;
            --card-bg: #1a0c27;
            --highlight-color: #ff7c00;
        }

        body {
            background: var(--bg);
            scroll-behavior: smooth;
            font-size: 16px;
        }

        /* Navbar */
        header nav {
            width: var(--width);
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100px;
            padding-top: 20px;
            position: relative;
            z-index: 100;
        }

        header nav .logo {
            font-size: 35px;
            font-weight: bold;
            background: linear-gradient(to left, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header nav .nav-links {
            transition: all 0.3s;
        }

        header nav .nav-links a {
            color: var(--text-color);
            margin-left: 50px;
            position: relative;
        }

        header nav .nav-links a::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(to left, var(--primary-color), var(--secondary-color));
            transition: 0.3s;
        }

        header nav .nav-links a:hover::after {
            width: 100%;
        }

        /* Contact Section */
        .contact-section {
            width: var(--width);
            margin: auto;
            padding: 50px 0;
            color: var(--text-color);
            text-align: center;
        }

        .contact-section h2 {
            font-size: 40px;
            margin-bottom: 40px;
            font-weight: bold;
            color: var(--highlight-color);
        }

        .contact-form {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            margin: auto;
        }

        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: none;
            background-color: #2a1a42;
            color: #fff;
            font-size: 16px;
            resize: none;
        }

        .contact-form textarea {
            height: 150px;
        }

        .contact-form button {
            background: linear-gradient(to left, var(--primary-color), var(--secondary-color));
            color: #fff;
            padding: 15px 35px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            transition: background 0.3s ease-in-out;
        }

        .contact-form button:hover {
            background: linear-gradient(to right, var(--secondary-color), var(--primary-color));
        }

        /* Google Maps Section */
        .google-maps {
            margin-top: 50px;
            width: 100%;
            height: 400px;
            border: 0;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* Mobile Responsive */
        @media (max-width: 767px) {
            header nav .nav-links a {
                margin-left: 20px;
            }

            .contact-form {
                padding: 20px;
            }

            .contact-form button {
                padding: 12px 30px;
                font-size: 16px;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header>
            <nav>
                <a href="#" class="logo">Portfolio</a>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="skills.html">Skills</a>
                    <a href="services.html">Services</a>
                    <a href="Project.html">Projects</a>
                    <a href="about.html">About</a>
                    <a href="contact.html" class="active">Contact</a>
                </div>
                <a href="https://www.linkedin.com/in/premkumar-pawar/" class="btn"></a>
            </nav>
        </header>

        <!-- Contact Section -->
        <div class="contact-section">
            <h2>Contact Me</h2>

            <p>If you have any project inquiries or would like to discuss a potential collaboration, feel free to reach out to me through the form below or connect with me on LinkedIn!</p>

            <!-- Contact Form -->
            <div class="contact-form">
                <form action="https://formspree.io/f/{your-form-id}" method="POST">
                    <input type="text" name="name" placeholder="Your Name" required />
                    <input type="email" name="email" placeholder="Your Email" required />
                    <textarea name="message" placeholder="Your Message" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>

            
        </div>
    </div>
</body>
</html>
